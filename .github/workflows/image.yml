name: image

# Builds and publishes the wasmify build-environment image to GHCR.
# Downstream projects (e.g. googlesql-wasm) consume the image via
# `jobs.<id>.container: ghcr.io/goccy/wasmify:<tag>` so their CI runs
# the wasmify pipeline against a frozen toolchain (wasi-sdk + binaryen
# + bazelisk + buf + wasmify CLI) without re-downloading on every run.
#
# Tag scheme:
#   - push to main          → :edge + :<commit-sha>
#   - tag v*                → :<commit-sha> + :<vX.Y.Z> + :latest
#   - manual workflow_dispatch → :edge

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write          # for actions/attest-build-provenance OIDC token
  attestations: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name and tags
        id: tags
        run: |
          set -eu
          REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          SHA="${GITHUB_SHA}"
          TAGS="${REPO}:${SHA}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VTAG="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS}\n${REPO}:${VTAG}\n${REPO}:latest"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TAGS="${TAGS}\n${REPO}:edge"
          else
            TAGS="${REPO}:edge"
          fi
          {
            echo "tags<<EOF"
            printf '%b' "${TAGS}"
            echo
            echo EOF
          } >> "${GITHUB_OUTPUT}"
          # Plain image name (no tag) — the attestation subject. Tags
          # share one digest, so a single attestation covers all of them.
          echo "image=${REPO}" >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        # SLSA build-provenance attestation, signed by the GitHub
        # Actions OIDC issuer and pushed to the registry alongside the
        # image manifest. Consumers verify with
        # `gh attestation verify oci://ghcr.io/<owner>/wasmify@<digest>`
        # or `cosign verify-attestation`. The attestations API rejects
        # writes from user-owned private repos; gate on visibility so a
        # private-repo run does not fail at the very last step. Flips
        # back on automatically the moment the repo is made public.
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ steps.tags.outputs.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  smoke:
    needs: image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}:${{ github.sha }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Verify wasmify toolchain inside image
        run: |
          set -eux
          wasmify --help | head -5
          buf --version
          bazel version 2>/dev/null || true
          /usr/local/bin/bazel --version 2>/dev/null || true
          ls $XDG_CONFIG_HOME/wasmify/bin/wasi-sdk/bin/clang
          $XDG_CONFIG_HOME/wasmify/bin/binaryen/bin/wasm-opt --version
