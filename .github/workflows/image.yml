name: image

# Builds and publishes the wasmify build-environment image to GHCR.
# Downstream projects (e.g. googlesql-wasm) consume the image via
# `jobs.<id>.container: ghcr.io/goccy/wasmify:<tag>` so their CI runs
# the wasmify pipeline against a frozen toolchain (wasi-sdk + binaryen
# + bazelisk + buf + wasmify CLI) without re-downloading on every run.
#
# Tag scheme:
#   - push to main          → :edge + :<commit-sha>
#   - tag v*                → :<commit-sha> + :<vX.Y.Z> + :latest
#   - manual workflow_dispatch → :edge

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image tags
        id: tags
        run: |
          set -eu
          REPO="ghcr.io/${GITHUB_REPOSITORY,,}"
          SHA="${GITHUB_SHA}"
          TAGS="${REPO}:${SHA}"
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VTAG="${GITHUB_REF#refs/tags/}"
            TAGS="${TAGS}\n${REPO}:${VTAG}\n${REPO}:latest"
          elif [[ "${GITHUB_REF}" == refs/heads/main ]]; then
            TAGS="${TAGS}\n${REPO}:edge"
          else
            TAGS="${REPO}:edge"
          fi
          {
            echo "tags<<EOF"
            printf '%b' "${TAGS}"
            echo
            echo EOF
          } >> "${GITHUB_OUTPUT}"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke:
    needs: image
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}:${{ github.sha }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Verify wasmify toolchain inside image
        run: |
          set -eux
          wasmify --help | head -5
          buf --version
          bazel version 2>/dev/null || true
          /usr/local/bin/bazel --version 2>/dev/null || true
          ls $XDG_CONFIG_HOME/wasmify/bin/wasi-sdk/bin/clang
          $XDG_CONFIG_HOME/wasmify/bin/binaryen/bin/wasm-opt --version
