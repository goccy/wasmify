---
version: 2
project_name: wasmify

builds:
  - id: wasmify
    main: ./cmd/wasmify
    binary: wasmify
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
  - id: protoc-gen-wasmify-go
    main: ./protoc-plugins/protoc-gen-wasmify-go
    binary: protoc-gen-wasmify-go
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - name_template: >-
      {{ .ProjectName }}_v{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE
      - README.md

nfpms:
  - file_name_template: >-
      {{ .ProjectName }}_{{ .Version }}-1_{{ .Arch }}
    homepage: https://github.com/goccy/wasmify
    maintainer: goccy
    description: Convert C/C++ projects to WebAssembly with auto-generated language bindings
    license: MIT
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  prerelease: auto
